# Cloudflare Workers config for sblossom-ops (deployed via @opennextjs/cloudflare).
# OpenNext builds a single Worker bundle at .open-next/worker.js + a static
# asset directory at .open-next/assets.

name = "sblossom-ops"
main = ".open-next/worker.js"
compatibility_date = "2025-01-09"
compatibility_flags = ["nodejs_compat"]

[assets]
binding = "ASSETS"
directory = ".open-next/assets"
